services:
    # ── Agent config renderer (init container) ──────────────────────
    spire-agent-init:
        image: alpine:3.19
        container_name: order-spire-agent-init
        entrypoint: ["/bin/sh", "-c"]
        command:
            - |
              apk add --no-cache gettext > /dev/null 2>&1
              envsubst < /tmpl/agent.conf.tmpl > /rendered/agent.conf
              echo "agent.conf rendered (server=$${SPIRE_SERVER_ADDRESS}:$${SPIRE_SERVER_PORT})"
        environment:
            - SPIRE_SERVER_ADDRESS=${SPIRE_SERVER_ADDRESS:-gateway-spire-server}
            - SPIRE_SERVER_PORT=${SPIRE_SERVER_PORT:-8081}
        volumes:
            - ./spiffe/spire-agent/agent.conf:/tmpl/agent.conf.tmpl:ro
            - spire-agent-conf:/rendered
        networks:
            - anser_project_network

    # ── SPIRE Agent ─────────────────────────────────────────────────
    spire-agent:
        image: ghcr.io/spiffe/spire-agent:1.12.0
        container_name: order-spire-agent
        command:
            - -config
            - /opt/spire/conf/agent/agent.conf
        volumes:
            - spire-agent-conf:/opt/spire/conf/agent:ro
            - ./spiffe/certs/agent.key.pem:/opt/spire/conf/agent/agent.key.pem:ro
            - ./spiffe/certs/agent.crt.pem:/opt/spire/conf/agent/agent.crt.pem:ro
            - spire-agent-sockets:/run/spire/sockets
        depends_on:
            spire-agent-init:
                condition: service_completed_successfully
        healthcheck:
            test: ["CMD", "/opt/spire/bin/spire-agent", "healthcheck", "-socketPath", "/run/spire/sockets/agent.sock"]
            interval: 5s
            timeout: 3s
            retries: 30
            start_period: 15s
        networks:
            - anser_project_network

    # ── spiffe-helper sidecar ───────────────────────────────────────
    order-helper:
        image: ghcr.io/spiffe/spiffe-helper:0.8.0
        container_name: order-helper
        pid: "service:spire-agent"
        command: ["-config", "/opt/spiffe-helper/helper.conf"]
        volumes:
            - ./spiffe/helper/order-service.conf:/opt/spiffe-helper/helper.conf:ro
            - spire-agent-sockets:/run/spire/sockets:ro
            - order-certs:/certs
        depends_on:
            spire-agent:
                condition: service_healthy
        restart: unless-stopped
        networks:
            - anser_project_network

    # ── Order Service ───────────────────────────────────────────────
    order-service:
        image: webdevops/php:8.2
        platform: linux/x86_64
        networks:
            - anser_project_network
        ports:
            - 8082:8080
            - 18082:8443
        working_dir: /app
        environment:
            - WEB_DOCUMENT_ROOT=/app/public
            - PHP_MEMORY_LIMIT=2048M
            - PHP_MAX_EXECUTION_TIME=300
            - PHP_POST_MAX_SIZE=2048M
            - PHP_UPLOAD_MAX_FILESIZE=2048M
            # ── SPIFFE / LSVID ──
            - SPIFFE_ID=spiffe://zt.local/order-service
            - SPIFFE_SHM_DIR=/certs
            - LSVID_REQUIRED=0
        volumes:
            - './app:/app'
            - order-certs:/certs:ro
        command: >
            bash -c "chmod 776 ./start_service.sh && ./start_service.sh"
        depends_on:
            - order-helper

    order_DB:
        image: postgres:11.12
        networks:
            - anser_project_network
        environment:
            POSTGRES_DB: order
            POSTGRES_USER: root
            POSTGRES_PASSWORD: root
        ports:
            - 8320:5432
        volumes:
            - ./order-db-data:/var/lib/postgresql/data/
        command:
            [
                "postgres",
                "-c",
                "logging_collector=on",
                "-c",
                "log_destination=stderr",
                "-c",
                "max_connections=50000"
            ]

volumes:
    spire-agent-conf:
    spire-agent-sockets:
    order-certs:

networks:
    anser_project_network:
        driver: bridge
