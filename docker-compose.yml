services:
    # ── SPIRE Agent ─────────────────────────────────────────────────
    # Connects to an external SPIRE Server (not included in this compose)
    spire-agent:
        image: ghcr.io/spiffe/spire-agent:1.12.0
        container_name: order-spire-agent
        command:
            - -config
            - /opt/spire/conf/agent/agent.conf
        volumes:
            - ./spiffe/spire-agent/agent.conf:/opt/spire/conf/agent/agent.conf:ro
            - ./spiffe/certs/order-agent.key.pem:/opt/spire/conf/agent/agent.key.pem:ro
            - ./spiffe/certs/order-agent.crt.pem:/opt/spire/conf/agent/agent.crt.pem:ro
            - spire-agent-sockets:/run/spire/sockets
        healthcheck:
            test: ["CMD", "/opt/spire/bin/spire-agent", "healthcheck", "-socketPath", "/run/spire/sockets/agent.sock"]
            interval: 5s
            timeout: 3s
            retries: 30
            start_period: 15s
        restart: unless-stopped
        networks:
            - anser_project_network

    # ── Go SPIFFE Sidecar ──────────────────────────────────────────
    # 取代 spiffe-helper：使用 Go 實作的 LSVID 驗證 sidecar。
    # 提供 UDS API (/lsvid/validate, /lsvid/create-base, /lsvid/extend)
    # 供 PHP SpiffeLsvidFilter 呼叫。
    order-spiffe-sidecar:
        build: ./spiffe-sidecar
        container_name: order-spiffe-sidecar
        pid: "service:spire-agent"
        environment:
            - SPIFFE_ENDPOINT_SOCKET=unix:///run/spire/sockets/agent.sock
            - SPIFFE_SHM_DIR=/certs
            - SPIFFE_SIDECAR_SOCKET=/sidecar/spiffe-sidecar.sock
            - SPIFFE_ID=spiffe://zt.local/order-service
            - SPIFFE_TRUST_DOMAIN=zt.local
            - SPIFFE_HEALTH_ADDR=:9901
            - LSVID_TTL_SECONDS=1800
        volumes:
            - spire-agent-sockets:/run/spire/sockets:ro
            - order-certs:/certs
            - sidecar-socket:/sidecar
        depends_on:
            spire-agent:
                condition: service_healthy
        restart: unless-stopped
        networks:
            - anser_project_network

    # ── Order Service (PHP) ─────────────────────────────────────────
    order-service:
        image: webdevops/php:8.2
        platform: linux/x86_64
        networks:
            - anser_project_network
        ports:
            - 8082:8080
            - 18082:8443
        working_dir: /app
        environment:
            - WEB_DOCUMENT_ROOT=/app/public
            - PHP_MEMORY_LIMIT=2048M
            - PHP_MAX_EXECUTION_TIME=300
            - PHP_POST_MAX_SIZE=2048M
            - PHP_UPLOAD_MAX_FILESIZE=2048M
            # ── SPIFFE / LSVID (Go sidecar) ──
            - SPIFFE_ID=spiffe://zt.local/order-service
            - SPIFFE_SHM_DIR=/certs
            - SPIFFE_SIDECAR_SOCKET=/sidecar/spiffe-sidecar.sock
            - LSVID_REQUIRED=0
            - LSVID_CAPTURE_DEBUG=${LSVID_CAPTURE_DEBUG:-0}
        volumes:
            - './app:/app'
            - order-certs:/certs:ro
            - sidecar-socket:/sidecar:ro
        command: >
            bash -c "chmod 776 ./start_service.sh && ./start_service.sh"
        depends_on:
            order-spiffe-sidecar:
                condition: service_started
        healthcheck:
            test: ["CMD-SHELL", "curl -so /dev/null -w '%{http_code}' http://127.0.0.1:8080/ | grep -qE '^[2-4]'"]
            interval: 10s
            timeout: 5s
            retries: 6
            start_period: 120s
        restart: unless-stopped

    order_DB:
        image: postgres:11.12
        networks:
            - anser_project_network
        environment:
            POSTGRES_DB: order
            POSTGRES_USER: root
            POSTGRES_PASSWORD: root
        ports:
            - 8320:5432
        volumes:
            - ./order-db-data:/var/lib/postgresql/data/
        restart: unless-stopped
        command:
            [
                "postgres",
                "-c",
                "logging_collector=on",
                "-c",
                "log_destination=stderr",
                "-c",
                "max_connections=50000"
            ]

volumes:
    spire-agent-sockets:
    order-certs:
    sidecar-socket:

networks:
    anser_project_network:
        external: true
